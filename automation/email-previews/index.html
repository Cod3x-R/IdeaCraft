<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IdeaCraft — Email Previews</title>
<style>
  body { margin:0; background:#241C12; font-family:'Trebuchet MS',Arial,sans-serif; color:#F5EDE0; }
  .page { max-width:760px; margin:0 auto; padding:40px 16px 80px; }
  .page > h1 { font-size:30px; margin:0 0 6px; }
  .page > p.sub { color:#B8A890; margin:0 0 8px; }
  .label { display:inline-block; margin:38px 0 12px; font-size:12px; letter-spacing:.16em;
           text-transform:uppercase; color:#12C774; font-weight:700;
           border-left:3px solid #F4B942; padding-left:10px; }
  .label small { color:#7A6A55; letter-spacing:.04em; text-transform:none; font-weight:400; }
</style>
</head>
<body>
<div class="page">
  <h1>IdeaCraft — Email Previews</h1>
  <p class="sub">Exactly what your customers and you will receive at each stage. These are static
     mock-ups; the live versions are sent by the Apps Script automation.</p>
  <p class="sub" style="color:#7A6A55;font-size:13px">Tip: the logo here loads from your site's
     <code>/images/</code> folder. In real emails it loads from <code>CONFIG.LOGO_URL</code>.</p>
  <div id="gallery"></div>
</div>

<script>
/* ---- mirror of CONFIG (preview values) ---- */
const C = {
  BUSINESS_NAME:'IdeaCraft', TAGLINE:'We Build Brands That Get Noticed.',
  NOTIFY_EMAIL:'ideacraftmain@gmail.com', PHONE:'+27 (66) 548 3946', WHATSAPP:'27665483946',
  WEBSITE_URL:'https://ideacraft.co.za', LOGO_URL:'/images/logo_ts_dark.png',
  COLOR_GREEN:'#12C774', COLOR_GREEN_DK:'#0DA862', COLOR_GOLD:'#F4B942',
  COLOR_DARK:'#0C0A08', COLOR_CREAM:'#F5EDE0', COLOR_TEXT:'#1A1108'
};
const esc = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');

function card(rows){return `<table role="presentation" width="100%" cellpadding="0" cellspacing="0"
  style="background:#FBF4E9;border:1px solid #ECDFCB;border-radius:12px;margin:4px 0 8px">
  <tr><td style="padding:16px 18px;font-family:Arial,Helvetica,sans-serif;font-size:14px;color:#4A3B2A">${rows}</td></tr></table>`;}
function kv(k,v){return v?`<div style="margin:0 0 6px"><span style="color:#9A8A78">${k}:</span>
  <strong style="color:${C.COLOR_TEXT}">${esc(v)}</strong></div>`:'';}

function shell(o){
  const cta = o.ctaText&&o.ctaUrl?`<tr><td style="padding:8px 0 4px">
    <a href="${o.ctaUrl}" style="display:inline-block;background:linear-gradient(135deg,${C.COLOR_GREEN},${C.COLOR_GREEN_DK});
    color:#04140C;font-weight:700;font-size:16px;text-decoration:none;padding:15px 30px;border-radius:999px;
    font-family:Arial,Helvetica,sans-serif">${o.ctaText}</a></td></tr>`:'';
  const eyebrow=o.eyebrow?`<div style="text-transform:uppercase;letter-spacing:.18em;font-size:11px;font-weight:700;
    color:${C.COLOR_GREEN};margin-bottom:10px;font-family:Arial,Helvetica,sans-serif">${o.eyebrow}</div>`:'';
  const logo=`<img src="${C.LOGO_URL}" alt="${C.BUSINESS_NAME}" height="38" style="height:38px;display:inline-block;border:0"/>`;
  return `<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#EFE6D8;padding:24px 8px">
  <tr><td align="center"><table role="presentation" width="600" cellpadding="0" cellspacing="0"
    style="width:600px;max-width:100%;background:#FFFDF9;border-radius:18px;overflow:hidden;box-shadow:0 18px 50px rgba(26,17,8,.14)">
    <tr><td style="background:${C.COLOR_DARK};padding:22px 32px"><table role="presentation" width="100%"><tr>
      <td align="left">${logo}</td>
      <td align="right" style="font-family:Arial,Helvetica,sans-serif;font-size:11px;letter-spacing:.12em;
        text-transform:uppercase;color:${C.COLOR_GOLD}">Brand Studio</td></tr></table></td></tr>
    <tr><td style="height:4px;background:linear-gradient(90deg,${C.COLOR_GREEN},${C.COLOR_GOLD})"></td></tr>
    <tr><td style="padding:34px 32px 12px;font-family:Arial,Helvetica,sans-serif;color:${C.COLOR_TEXT}">${eyebrow}
      <h1 style="margin:0 0 14px;font-size:26px;line-height:1.18;color:${C.COLOR_TEXT};
        font-family:'Trebuchet MS',Arial,sans-serif;font-weight:800">${o.heading||''}</h1>
      ${o.intro?`<p style="margin:0 0 18px;font-size:15px;line-height:1.7;color:#4A3B2A">${o.intro}</p>`:''}
      ${o.bodyHtml||''}</td></tr>
    <tr><td style="padding:6px 32px 30px"><table role="presentation">${cta}</table>${o.secondaryHtml||''}</td></tr>
    ${o.signOff!==false?`<tr><td style="padding:0 32px 30px;font-family:Arial,Helvetica,sans-serif;color:#4A3B2A;font-size:15px">
      <p style="margin:0">Warmly,<br><strong style="color:${C.COLOR_TEXT}">The ${C.BUSINESS_NAME} Studio</strong></p></td></tr>`:''}
    <tr><td style="background:${C.COLOR_DARK};padding:22px 32px;font-family:Arial,Helvetica,sans-serif">
      <p style="margin:0 0 6px;color:${C.COLOR_CREAM};font-size:13px;font-weight:700">${C.BUSINESS_NAME}</p>
      <p style="margin:0;color:#8C7B66;font-size:12px;line-height:1.7">${C.TAGLINE}<br>
        📧 <a href="mailto:${C.NOTIFY_EMAIL}" style="color:${C.COLOR_GREEN};text-decoration:none">${C.NOTIFY_EMAIL}</a>
        &nbsp;•&nbsp; 📱 <a href="https://wa.me/${C.WHATSAPP}" style="color:${C.COLOR_GREEN};text-decoration:none">${C.PHONE}</a><br>
        🌐 <a href="${C.WEBSITE_URL}" style="color:${C.COLOR_GREEN};text-decoration:none">${C.WEBSITE_URL}</a>
        &nbsp;•&nbsp; Made with 💚 in South Africa</p></td></tr>
  </table></td></tr></table>`;
}

const link = '#';
const emails = [
  ['Customer · Welcome + Brand Brief', 'Sent automatically the moment they enquire', shell({
    eyebrow:'Welcome to IdeaCraft', heading:'Hi Jane, let’s build your brand! 🎉',
    intro:'Thank you for your enquiry about the <strong>Gold Startup Package — R6,500</strong>. We’re excited to work with Awesome Co.',
    bodyHtml:`<p style="margin:0 0 16px;font-size:15px;line-height:1.7;color:#4A3B2A">To get started, please fill in our quick
      <strong>Brand Brief</strong>. It tells us your colours, style, and vision so the very first draft lands close to what you imagine.</p>`+
      card(`<strong style="color:${C.COLOR_TEXT}">What happens next</strong><div style="margin-top:8px">
      1️⃣ &nbsp;You complete the Brand Brief (button below)<br>2️⃣ &nbsp;We design your package and send you a preview<br>
      3️⃣ &nbsp;You confirm, or request tweaks until it’s perfect<br>4️⃣ &nbsp;Pay securely &amp; receive your complete files</div>`),
    ctaText:'Fill in my Brand Brief →', ctaUrl:link})],

  ['Customer · Preview Ready', 'Menu ③ Send Preview', shell({
    eyebrow:'Preview Ready', heading:'Jane, your design preview is here 👀',
    intro:'We’ve been hard at work on the <strong>Gold Startup Package</strong> for Awesome Co. Take a look and tell us what you think.',
    bodyHtml:card(`<strong style="color:${C.COLOR_TEXT}">How to review</strong><div style="margin-top:8px">
      • Open the preview using the button below.<br>• Love it? Just reply <strong>“Approved”</strong> and we’ll send your payment link.<br>
      • Want changes? Reply with exactly what to adjust — we’ll refine it.</div>`),
    ctaText:'View my preview →', ctaUrl:link})],

  ['Customer · Revision Acknowledged', 'Menu ④ Log Revision Request', shell({
    eyebrow:'Revisions Underway', heading:'Got it, Jane — we’re on it ✍️',
    intro:'Thanks for the feedback. Our designers are applying your requested changes now, and we’ll send you an updated preview shortly.',
    bodyHtml:card(`<strong style="color:${C.COLOR_TEXT}">What we’re changing</strong><div style="margin-top:8px">Make the logo green a bit warmer and try an all-caps wordmark.</div>`)})],

  ['Customer · Payment Link', 'Menu ⑥ Send Payment Link', shell({
    eyebrow:'Final Step', heading:'Jane, your package is approved! 🎉',
    intro:'So glad you love it! To release your complete files for the <strong>Gold Startup Package</strong>, please complete your secure payment below.',
    bodyHtml:card(kv('Package','Gold Startup Package — R6,500')+`<div style="margin-top:8px;color:#4A3B2A">As soon as payment reflects, we’ll send a link to your full package — every file, every format, ready to use.</div>`),
    ctaText:'Pay securely with Yoco →', ctaUrl:link})],

  ['Customer · Payment Received', 'Menu ⑦ Mark as Paid', shell({
    eyebrow:'Payment Received', heading:'Thank you, Jane! 🙏',
    intro:'We’ve received your payment for the <strong>Gold Startup Package</strong>. We’re packaging up your complete files now and will send your delivery link very shortly.',
    bodyHtml:card(kv('Package','Gold Startup Package — R6,500')+kv('Status','Paid ✓'))})],

  ['Customer · Final Delivery', 'Menu ⑧ Send Final Delivery', shell({
    eyebrow:'Delivered 🎁', heading:'Jane, your brand package is ready! 🚀',
    intro:'It’s been a pleasure building this for Awesome Co. Your complete <strong>Gold Startup Package</strong> is waiting in the folder below — every file, in every format you need.',
    bodyHtml:card(`<strong style="color:${C.COLOR_TEXT}">Inside your folder</strong><div style="margin-top:8px">
      • All final designs (PNG, JPG, PDF + source files)<br>• Print-ready &amp; web-ready versions<br>• Any guides included in your package</div>`)+
      `<p style="margin:14px 0 0;font-size:15px;line-height:1.7;color:#4A3B2A">Loved working with us? A quick review or a referral means the world to a growing studio. 💚</p>`,
    ctaText:'Open my package →', ctaUrl:link})],

  ['Owner · New Enquiry Alert', 'Sent to you on every website enquiry', shell({
    eyebrow:'New Lead', heading:'New enquiry: Awesome Co. 🔔',
    intro:'A new enquiry just came in via the website. The customer has been auto-sent the Brand Brief.',
    bodyHtml:card(kv('Client ID','IC-26-001')+kv('Name','Jane Smith')+kv('Business','Awesome Co.')+kv('Email','jane@example.com')+kv('Phone','+27 82 000 0000')+kv('Package','Gold Startup Package — R6,500')+`<div style="margin-top:8px;color:#9A8A78">Message:</div><div style="color:#4A3B2A">We sell handmade candles and need a full brand + socials.</div>`),
    ctaText:'Open the CRM →', ctaUrl:link, signOff:false})],

  ['Owner · Brief Received', 'Sent when the customer submits the brief', shell({
    eyebrow:'Brief Received', heading:'Brief in: Awesome Co. 📝',
    intro:'The client completed the Brand Brief. You’re clear to start designing.',
    bodyHtml:card(kv('Your full name','Jane Smith')+kv('Business / brand name','Awesome Co.')+kv('Preferred colours','Warm greens + gold, like #12C774')+kv('Pick the words…','Modern, Friendly, Earthy / Natural, Trustworthy')),
    ctaText:'View full response →', ctaUrl:link, signOff:false})]
];

document.getElementById('gallery').innerHTML = emails.map(([t,sub,html])=>
  `<div class="label">${t} <small>— ${sub}</small></div>${html}`).join('');
</script>
</body>
</html>
