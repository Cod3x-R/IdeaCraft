<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | IdeaCraft</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .error-number {
      font-family: 'Syne', sans-serif;
      font-size: 8rem;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, var(--emerald), var(--emerald-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div>
      <div class="error-number">404</div>
      <h2>Page not found.</h2>
      <p style="margin: 1rem 0 2rem;">This page doesn't exist — but your brand could.</p>
      <a href="/" class="btn btn-primary btn-lg">← Back to Home</a>
    </div>
  </div>
  <script>
    const saved = localStorage.getItem('ideacraft-theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);
  </script>
</body>
</html>
